<!DOCTYPE html>
<html>
  <head>
    <script>
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      // Always redirect to index with the full path preserved
      window.location.replace('/' + '?redirect=' + encodeURIComponent(path) + '&search=' + encodeURIComponent(search) + '&hash=' + encodeURIComponent(hash));
    </script>
  </head>
</html>
