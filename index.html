    <script>
      var params = new URLSearchParams(window.location.search);
      var redirect = params.get('redirect');
      var hash = params.get('hash');

        window.history.replaceState(null, '', redirect + (hash ? decodeURIComponent(hash) : ''));
      }
</script>
